<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f2937">
  <title>Treniruotės vedlys</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --line: #d1d5db;
      --accent: #1f2937;
      --done: #15803d;
      --done-bg: #dcfce7;
      --danger: #991b1b;
      --focus: #2563eb;
      --shadow: 0 8px 22px rgba(0,0,0,.08);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.35;
    }
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--accent);
      color: #fff;
      padding: 14px 16px 12px;
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.25;
    }
    header p {
      margin: 4px 0 0;
      color: #e5e7eb;
      font-size: .92rem;
    }
    main {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    label {
      display: grid;
      gap: 4px;
      font-size: .88rem;
      color: var(--muted);
      font-weight: 650;
    }
    select, input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }
    select:focus, input:focus, button:focus {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }
    .exerciseHeader {
      display: grid;
      gap: 8px;
    }
    .count {
      color: var(--muted);
      font-weight: 700;
      font-size: .95rem;
    }
    h2 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.18;
    }
    .imageBox {
      min-height: 132px;
      display: grid;
      place-items: center;
      background: #f3f4f6;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
    }
    .imageBox svg {
      width: min(320px, 96%);
      height: 130px;
    }
    .sets {
      display: grid;
      gap: 10px;
    }
    .setCard {
      border: 2px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 10px;
      align-items: center;
      background: #fff;
      transition: background .12s ease, border-color .12s ease;
    }
    .setCard.done {
      background: var(--done-bg);
      border-color: var(--done);
    }
    .setTitle {
      font-size: 1.08rem;
      font-weight: 800;
    }
    .setInfo {
      color: var(--muted);
      font-size: .98rem;
    }
    .setFields {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      min-height: 46px;
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    button.doneButton {
      background: #374151;
      color: #fff;
      min-width: 110px;
    }
    .setCard.done button.doneButton {
      background: var(--done);
    }
    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .wide {
      grid-column: 1 / -1;
    }
    .progress {
      color: var(--muted);
      font-weight: 700;
      font-size: .98rem;
    }
    .exerciseList {
      display: grid;
      gap: 6px;
    }
    .exerciseList button {
      text-align: left;
      min-height: 40px;
      padding: 8px 10px;
      font-weight: 700;
      border-radius: 12px;
    }
    .exerciseList button.current {
      background: #111827;
      color: #fff;
    }
    .exerciseList button.completed {
      background: var(--done-bg);
      color: #064e3b;
      border: 1px solid #86efac;
    }
    details summary {
      cursor: pointer;
      font-weight: 800;
      padding: 4px 0;
    }
    .smallText {
      color: var(--muted);
      font-size: .92rem;
      margin: 6px 0 0;
    }
    .footerActions {
      display: grid;
      gap: 8px;
    }
    .danger {
      background: #fee2e2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }
    .hidden {
      position: absolute;
      left: -10000px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    @media (max-width: 520px) {
      main { padding: 10px; gap: 10px; }
      .panel { padding: 12px; border-radius: 16px; }
      .controls { grid-template-columns: 1fr; }
      h2 { font-size: 1.28rem; }
      .setCard { grid-template-columns: 1fr; }
      .setFields { grid-template-columns: 1fr 1fr; }
      .doneButton { width: 100%; }
      .imageBox { min-height: 112px; }
      .imageBox svg { height: 112px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Treniruotės vedlys</h1>
      <p>Pratimų eiliškumas, planuoti svoriai ir setų žymėjimas telefone.</p>
    </header>

    <main>
      <section class="panel controls" aria-label="Pasirinkimai">
        <label>Kas treniruojasi
          <select id="person">
            <option>Kristijonas</option>
            <option>Vilmantas</option>
          </select>
        </label>
        <label>Treniruotė
          <select id="workout"></select>
        </label>
      </section>

      <section class="panel exerciseHeader" aria-live="polite">
        <div class="count" id="count"></div>
        <h2 id="exerciseName"></h2>
        <div class="imageBox" id="exerciseImage" aria-hidden="true"></div>
        <p class="smallText" id="hint"></p>
      </section>

      <section class="panel sets" aria-label="Setai" id="sets"></section>

      <section class="panel">
        <div class="nav">
          <button class="secondary" id="prevBtn">Ankstesnis pratimas</button>
          <button id="nextBtn">Kitas pratimas</button>
        </div>
        <p class="progress" id="progress"></p>
      </section>

      <section class="panel">
        <details>
          <summary>Visi šios treniruotės pratimai</summary>
          <p class="smallText">Paspauskite pratimą, kad pereitumėte tiesiai prie jo.</p>
          <div class="exerciseList" id="exerciseList"></div>
        </details>
      </section>

      <section class="panel footerActions">
        <button class="secondary" id="installBtn" hidden>Įdiegti į telefoną</button>
        <button class="danger" id="resetBtn">Išvalyti šios treniruotės pažymėjimus</button>
        <p class="smallText">Duomenys saugomi šiame įrenginyje. Programa pirmiausia skirta sekti treniruotės eigą, ne ilgalaikei svorių analizei.</p>
      </section>
    </main>
  </div>

function keyBase() {
  return `treniruote:${appState.person}:${appState.workoutId}`;
}

function setKey(exerciseIndex, setIndex) {
  return `${keyBase()}:ex:${exerciseIndex}:set:${setIndex}`;
}

function fieldKey(exerciseIndex, setIndex, field) {
  return `${keyBase()}:ex:${exerciseIndex}:set:${setIndex}:${field}`;
}

function getWorkout() {
  return WORKOUTS.find(w => w.id === appState.workoutId) || WORKOUTS[0];
}

function getExercise() {
  return getWorkout().exercises[appState.exerciseIndex];
}

function isDone(exerciseIndex, setIndex) {
  return localStorage.getItem(setKey(exerciseIndex, setIndex)) === "1";
}

function setDone(exerciseIndex, setIndex, done) {
  if (done) localStorage.setItem(setKey(exerciseIndex, setIndex), "1");
  else localStorage.removeItem(setKey(exerciseIndex, setIndex));
}

function valueOrDash(value) {
  return value && String(value).trim() ? value : "—";
}

    case "reardelt":
      art = `${chair}<circle cx="140" cy="45" r="13" ${common}/><line x1="140" y1="58" x2="140" y2="86" ${common}/><line x1="120" y1="62" x2="82" y2="52" ${common}/><line x1="160" y1="62" x2="198" y2="52" ${common}/><circle cx="74" cy="50" r="7" ${common}/><circle cx="206" cy="50" r="7" ${common}/>`; break;
    case "bench":

    case "triceps":

    case "pullover":

    case "lunge":
      art = `${body}<line x1="140" y1="84" x2="110" y2="116" ${common}/><line x1="140" y1="84" x2="184" y2="108" ${common}/><line x1="110" y1="116" x2="88" y2="116" ${common}/><line x1="184" y1="108" x2="210" y2="108" ${common}/>`; break;
    case "squat":
      art = `${body}<line x1="140" y1="84" x2="110" y2="110" ${common}/><line x1="140" y1="84" x2="170" y2="110" ${common}/><line x1="96" y1="112" x2="124" y2="112" ${common}/><line x1="156" y1="112" x2="184" y2="112" ${common}/>`; break;
    case "legraise":
      art = `<line x1="72" y1="20" x2="72" y2="120" ${common}/><line x1="72" y1="20" x2="128" y2="20" ${common}/><circle cx="120" cy="52" r="13" ${common}/><line x1="120" y1="65" x2="120" y2="95" ${common}/><line x1="105" y1="72" x2="72" y2="38" ${common}/><line x1="135" y1="72" x2="128" y2="20" ${common}/><line x1="120" y1="95" x2="170" y2="88" ${common}/>`; break;
    case "crunch":
      art = `<line x1="70" y1="96" x2="210" y2="96" ${common}/><circle cx="104" cy="58" r="13" ${common}/><path d="M118 68 C140 72, 154 84, 164 96" ${common}/><line x1="164" y1="96" x2="198" y2="72" ${common}/>`; break;

  return `<svg role="img" aria-label="Pratimo schema" viewBox="0 0 280 136" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="272" height="128" rx="18" fill="#fff" stroke="#d1d5db" stroke-width="2"/>${art}</svg>`;
}

function init() {
  WORKOUTS.forEach(w => {
    const option = document.createElement("option");
    option.value = w.id;
    option.textContent = w.title;
    el.workout.appendChild(option);
  });

  const saved = JSON.parse(localStorage.getItem("treniruote:nustatymai") || "{}");
  appState.person = saved.person || appState.person;
  appState.workoutId = saved.workoutId || appState.workoutId;
  appState.exerciseIndex = Number.isInteger(saved.exerciseIndex) ? saved.exerciseIndex : 0;
  el.person.value = appState.person;
  el.workout.value = appState.workoutId;
  clampIndex();

  el.person.addEventListener("change", () => {
    appState.person = el.person.value;
    saveSettings();
    render();
  });

  el.workout.addEventListener("change", () => {
    appState.workoutId = el.workout.value;
    appState.exerciseIndex = 0;
    saveSettings();
    render();
  });

  el.prev.addEventListener("click", () => {
    appState.exerciseIndex = Math.max(0, appState.exerciseIndex - 1);
    saveSettings();
    render();
  });

  el.next.addEventListener("click", () => {
    const max = getWorkout().exercises.length - 1;
    appState.exerciseIndex = Math.min(max, appState.exerciseIndex + 1);
    saveSettings();
    render();
  });

  el.reset.addEventListener("click", () => {
    const prefix = keyBase();
    Object.keys(localStorage).forEach(k => {
      if (k.startsWith(prefix)) localStorage.removeItem(k);
    });
    render();
  });

  el.install.addEventListener("click", async () => {
    if (!appState.installPrompt) return;
    appState.installPrompt.prompt();
    await appState.installPrompt.userChoice;
    appState.installPrompt = null;
    el.install.hidden = true;
  });

  window.addEventListener("beforeinstallprompt", event => {
    event.preventDefault();
    appState.installPrompt = event;
    el.install.hidden = false;
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  }

  render();
}

function saveSettings() {
  localStorage.setItem("treniruote:nustatymai", JSON.stringify({
    person: appState.person,
    workoutId: appState.workoutId,
    exerciseIndex: appState.exerciseIndex
  }));
}

function clampIndex() {
  const max = getWorkout().exercises.length - 1;
  if (appState.exerciseIndex < 0) appState.exerciseIndex = 0;
  if (appState.exerciseIndex > max) appState.exerciseIndex = max;
}

function render() {
  clampIndex();
  const workout = getWorkout();
  const exercise = getExercise();
  el.count.textContent = `${workout.title}. Pratimas ${appState.exerciseIndex + 1} iš ${workout.exercises.length}.`;
  el.exerciseName.textContent = exercise.name;
  el.image.innerHTML = svgFor(exercise.image);
  el.hint.textContent = "Pažymėkite setą kaip atliktą. Svorį galima palikti pagal planą arba pataisyti pagal tai, ką darote šiandien.";

  renderSets(exercise);
  renderNav(workout);
  renderList(workout);
}

function renderSets(exercise) {
  el.sets.innerHTML = "";
  const weights = exercise.weights[appState.person] || ["","",""];
  for (let i = 0; i < 3; i++) {
    const plannedWeight = valueOrDash(weights[i]);
    const plannedReps = valueOrDash(exercise.reps[i]);
    const done = isDone(appState.exerciseIndex, i);

    const card = document.createElement("article");
    card.className = "setCard" + (done ? " done" : "");
    card.setAttribute("aria-label", `${i + 1} setas. Pakartojimai: ${plannedReps}. Svoris: ${plannedWeight}.`);

    const text = document.createElement("div");
    text.innerHTML = `
      <div class="setTitle">${i + 1} setas</div>
      <div class="setInfo">Pakartojimai: <strong>${plannedReps}</strong>. Svoris: <strong>${plannedWeight}</strong>.</div>
    `;

    const button = document.createElement("button");
    button.className = "doneButton";
    button.type = "button";
    button.setAttribute("aria-pressed", done ? "true" : "false");
    button.textContent = done ? "Atlikta" : "Pažymėti";
    button.addEventListener("click", () => {
      setDone(appState.exerciseIndex, i, !isDone(appState.exerciseIndex, i));
      render();
    });

    const fields = document.createElement("div");
    fields.className = "setFields";
    const storedWeight = localStorage.getItem(fieldKey(appState.exerciseIndex, i, "weight"));
    const storedReps = localStorage.getItem(fieldKey(appState.exerciseIndex, i, "reps"));
    fields.innerHTML = `
      <label>Šiandienos svoris
        <input inputmode="decimal" aria-label="${i + 1} seto šiandienos svoris" value="${escapeHtml(storedWeight ?? (weights[i] || ""))}">
      </label>
      <label>Atlikti pakartojimai
        <input inputmode="numeric" aria-label="${i + 1} seto atlikti pakartojimai" value="${escapeHtml(storedReps ?? (exercise.reps[i] || ""))}">
      </label>
    `;
    const [weightInput, repsInput] = fields.querySelectorAll("input");
    weightInput.addEventListener("input", e => localStorage.setItem(fieldKey(appState.exerciseIndex, i, "weight"), e.target.value));
    repsInput.addEventListener("input", e => localStorage.setItem(fieldKey(appState.exerciseIndex, i, "reps"), e.target.value));

    card.appendChild(text);
    card.appendChild(button);
    card.appendChild(fields);
    el.sets.appendChild(card);
  }
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

function renderNav(workout) {
  el.prev.disabled = appState.exerciseIndex === 0;
  el.next.disabled = appState.exerciseIndex === workout.exercises.length - 1;
  const totalSets = workout.exercises.length * 3;
  let doneSets = 0;
  workout.exercises.forEach((_, exerciseIndex) => {
    for (let setIndex = 0; setIndex < 3; setIndex++) {
      if (isDone(exerciseIndex, setIndex)) doneSets++;
    }
  });
  el.progress.textContent = `Pažymėta ${doneSets} iš ${totalSets} setų.`;
}

function renderList(workout) {
  el.exerciseList.innerHTML = "";
  workout.exercises.forEach((exercise, index) => {
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = `${index + 1}. ${exercise.name}`;
    const completed = [0,1,2].every(setIndex => isDone(index, setIndex));
    button.className = index === appState.exerciseIndex ? "current" : (completed ? "completed" : "secondary");
    button.addEventListener("click", () => {
      appState.exerciseIndex = index;
      saveSettings();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    el.exerciseList.appendChild(button);
  });
}

init();
</script>
