<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f2937">
  <title>Treniruotės vedlys</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Treniruotės vedlys</h1>
      <p>Pratimų eiliškumas, planuoti svoriai ir setų žymėjimas telefone.</p>
    </header>

    <main>
      <section class="panel controls" aria-label="Pasirinkimai">
        <label>Kas treniruojasi
          <select id="person">
            <option>Kristijonas</option>
            <option>Vilmantas</option>
          </select>
        </label>
        <label>Treniruotė
          <select id="workout"></select>
        </label>
      </section>

      <section class="panel sessionPanel" id="sessionPanel" aria-live="polite">
        <div>
          <div class="sessionTitle" id="sessionTitle"></div>
          <p class="smallText" id="sessionText"></p>
        </div>
        <div class="sessionActions">
          <button class="secondary" id="continueSessionBtn" hidden>Tęsti</button>
          <button class="secondary" id="startSessionBtn">Pradėti naują</button>
          <button id="finishSessionBtn">Baigti treniruotę</button>
        </div>
      </section>

      <section class="panel exerciseHeader" aria-live="polite">
        <div class="count" id="count"></div>
        <button id="openHistoryBtn" class="unstyledButton">
          <h2 id="exerciseName"></h2>
          <div class="imageBox" id="exerciseImage" aria-hidden="true"></div>
        </button>
        <p class="smallText" id="hint"></p>
      </section>

      <div id="mainWorkoutView">
        <section class="panel sets" aria-label="Setai" id="sets"></section>

        <section class="panel">
          <div class="nav">
            <button class="secondary" id="prevBtn">Ankstesnis pratimas</button>
            <button id="nextBtn">Kitas pratimas</button>
          </div>
          <p class="progress" id="progress"></p>
        </section>

        <section class="panel">
          <details>
            <summary>Visi šios treniruotės pratimai</summary>
            <p class="smallText">Paspauskite pratimą, kad pereitumėte tiesiai prie jo.</p>
            <div class="exerciseList" id="exerciseList"></div>
          </details>
        </section>
      </div>

      <div id="historyView" hidden>
        <section class="panel">
          <h2 style="margin-bottom: 8px;">Istorija</h2>

          <div class="chartBox" style="margin-top: 16px; margin-bottom: 16px;" aria-hidden="true">
            <svg id="historyChart" viewBox="0 0 300 150" width="100%" height="auto"></svg>
          </div>

          <div style="overflow-x: auto; margin-bottom: 16px;">
            <table class="historyTable">
              <thead>
                <tr>
                  <th>Data</th>
                  <th>1 setas</th>
                  <th>2 setas</th>
                  <th>3 setas</th>
                </tr>
              </thead>
              <tbody id="historyTbody"></tbody>
            </table>
          </div>

          <button id="backToWorkoutBtn" class="wide">Atgal į treniruotę</button>
        </section>
      </div>

      <section class="panel footerActions">
        <button class="secondary" id="installBtn" hidden>Įdiegti į telefoną</button>
        <button class="secondary" id="exportBtn">Eksportuoti istoriją (CSV)</button>
        <button class="danger" id="resetBtn">Pradėti naują treniruotę</button>
        <p class="smallText">Duomenys saugomi šiame įrenginyje. Programa seka treniruotės eigą ir svorių istoriją.</p>
      </section>
    </main>
  </div>

<script src="script.js" defer></script>
</body>
</html>
